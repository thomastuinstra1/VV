<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/register.css">
    <script src="js/register.js" defer></script>
</head>
<body>
    <header>
        <div class="container nav-container">
            <div class="logo">
                <a href="index.html">Gereedschapspunt</a>
            </div>
            <nav>
                <ul>
                    <li><a href="#">Aanbod</a></li>
                    <li><a href="#">Hoe werkt het?</a></li>
                    <li><a href="inlog.html">Inloggen</a></li>
                    <li><a href="accountinstellingen.html">Account</a></li>
                    <li><a href="gereedschapsregistratie.html" class="cta-small">Plaats gereedschap</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="login-container">
        <h1>Register</h1>
        <form>
            <div class="form-group">
                <label for="E_mail">Email</label>
                <input type="email" id="E_mail" name="E_mail" required> <!-- ✅ type en id gecorrigeerd -->
            </div>
            <div class="form-group">
                <label for="Name">Gebruikersnaam</label>
                <input type="text" id="Name" name="Name" required>
            </div>
            <div class="form-group">
                <label for="Password">Wachtwoord</label>
                <input type="password" id="Password" name="Password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Bevestig Wachtwoord</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <div class="form-group">
                <label for="Postcode">Postcode</label>
                <input type="text" id="Postcode" name="Postcode" required>
            </div>
            <button type="submit">Registreer</button>
            <div class="form-group">
                <a href="inlog.html">Heb je al een account? Log hier in.</a>
            </div>
        </form>
    </div>
    <footer>
        <div class="container">
            <p>&copy; 2026 Gereedschapspunt</p>
            <ul>
                <li><a href="#">Over ons</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Privacy</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
