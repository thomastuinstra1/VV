<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="css/inlog.css">
    <script src="js/inlog.js" defer></script> <!-- ✅ defer toegevoegd -->
</head>
<body>
    <header>
        <div class="container nav-container">
            <div class="logo">
                <a href="index.html">Gereedschapspunt</a>
            </div>
            <nav>
                <ul>
                    <li><a href="#">Aanbod</a></li>
                    <li><a href="#">Hoe werkt het?</a></li>
                    <li><a href="inlog.html">Inloggen</a></li>
                    <li><a href="accountinstellingen.html">Account</a></li>
                    <li><a href="gereedschapsregistratie.html" class="cta-small">Plaats gereedschap</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="login-container">
        <h1>Log In</h1>
        <form>
            <div class="form-group">
                <label for="login">Email of Gebruikersnaam</label>
                <input type="text" id="login" name="login" required> <!-- ✅ één veld voor email én username -->
            </div>
            <div class="form-group">
                <label for="Password">Wachtwoord</label>
                <input type="password" id="Password" name="Password" required>
            </div>
            <button type="submit">Log In</button>
            <div class="form-group">
                <a href="/register.html">Heb je nog geen account? Registreer hier.</a>
            </div>
        </form>
    </div>
    <footer>
        <div class="container">
            <p>&copy; 2026 Gereedschapspunt</p>
            <ul>
                <li><a href="#">Over ons</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Privacy</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
