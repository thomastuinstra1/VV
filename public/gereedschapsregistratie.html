<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gereedschap toevoegen</title>
</head>

<body>

<h1>Nieuw gereedschap toevoegen</h1>

<form id="toolForm">

<label>Naam</label><br>
<input type="text" name="Naam" required><br><br>

<label>Categorie</label><br>
<select name="Categorie_id" id="categorieSelect">
  <option value="">-- Kies een categorie --</option>
</select><br><br>

<label>Beschrijving</label><br>
<textarea name="Beschrijving"></textarea><br><br>

<label>Staat</label><br>
<select name="Staat">
<option value="Nieuw">Nieuw</option>
<option value="Gebruikt">Gebruikt</option>
<option value="Versleten">Versleten</option>
</select><br><br>

<label>Beschikbaar</label><br>
<select name="Beschikbaar">
<option value="true">Ja</option>
<option value="false">Nee</option>
</select><br><br>

<label>Borg bedrag</label><br>
<input type="number" step="0.01" name="BorgBedrag"><br><br>

<label>Afbeelding (url)</label><br>
<input type="text" name="Afbeelding"><br><br>

<button type="submit">Opslaan</button>

</form>

<script src="gereedschap.js"></script>

</body>
</html>
