<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gereedschap toevoegen</title>
</head>

<body>

<h1>Nieuw gereedschap toevoegen</h1>

<form id="toolForm">

<label>Naam</label><br>
<input type="text" name="Naam" required><br><br>

<label>Categorieën</label><br>

<strong>Type</strong><br>
<input type="checkbox" name="Categorieen" value="5"> Bescherming<br>
<input type="checkbox" name="Categorieen" value="6"> Meetapparatuur<br>
<input type="checkbox" name="Categorieen" value="7"> Tuingereedschap<br>
<input type="checkbox" name="Categorieen" value="8"> Boormachines<br>
<input type="checkbox" name="Categorieen" value="9"> Verfgereedschap<br>
<input type="checkbox" name="Categorieen" value="10"> Handgereedschap<br><br>

<strong>Materiaal</strong><br>
<input type="checkbox" name="Categorieen" value="11"> IJzer<br>
<input type="checkbox" name="Categorieen" value="12"> Hout<br>
<input type="checkbox" name="Categorieen" value="13"> Steen<br><br>

<strong>Werkwijze</strong><br>
<input type="checkbox" name="Categorieen" value="14"> Bekabeld<br>
<input type="checkbox" name="Categorieen" value="15"> Brandstof<br>
<input type="checkbox" name="Categorieen" value="16"> Accu<br><br>

<strong>Gewicht</strong><br>
<input type="checkbox" name="Categorieen" value="17"> 0-5kg<br>
<input type="checkbox" name="Categorieen" value="18"> 5-10kg<br>
<input type="checkbox" name="Categorieen" value="19"> 10+kg<br><br>

<strong>Staat</strong><br>
<input type="checkbox" name="Categorieen" value="21"> Nieuw<br>
<input type="checkbox" name="Categorieen" value="22"> Gebruikt<br>
<input type="checkbox" name="Categorieen" value="23"> Versleten<br><br>

<label>Beschrijving</label><br>
<textarea name="Beschrijving"></textarea><br><br>

<label>Beschikbaar van</label><br>
<input type="date" name="BeschikbaarVanaf"><br><br>

<label>Beschikbaar tot</label><br>
<input type="date" name="BeschikbaarTot"><br><br>

<label>Borg bedrag</label><br>
<input type="number" step="0.01" name="BorgBedrag"><br><br>

<label>Afbeelding</label><br>
<img id="gereedschap-preview" src="" alt="Afbeelding preview"
  style="width:100px; height:100px; object-fit:cover; display:none;"><br>
<input type="file" id="afbeelding-input" accept="image/*"><br>
<button type="button" id="upload-btn">Upload afbeelding</button>
<input type="hidden" id="afbeelding-url" name="Afbeelding"><br><br>

<button type="submit">Opslaan</button>

</form>

<script src="js/gereedschapsregistratie.js"></script>

</body>
</html>
