<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gereedschap toevoegen</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 20px auto;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
}

.option {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}

.error {
  border: 2px solid red;
}

#melding {
  margin-bottom: 15px;
  font-weight: bold;
}
</style>

</head>
<body>

<h1>Nieuw gereedschap toevoegen</h1>

<p id="melding"></p>

<form id="toolForm">

<label>Naam *</label><br>
<input type="text" name="Naam" required><br><br>

<label>Categorieën *</label><br>

<strong>Type</strong><br>
<label class="option"><input type="checkbox" name="Type" value="5" data-group="Type"> Bescherming</label>
<label class="option"><input type="checkbox" name="Type" value="6" data-group="Type"> Meetapparatuur</label>
<label class="option"><input type="checkbox" name="Type" value="7" data-group="Type"> Tuingereedschap</label><br>

<strong>Materiaal</strong><br>
<label class="option"><input type="checkbox" name="Materiaal" value="11" data-group="Materiaal"> IJzer</label>
<label class="option"><input type="checkbox" name="Materiaal" value="12" data-group="Materiaal"> Hout</label>
<label class="option"><input type="checkbox" name="Materiaal" value="13" data-group="Materiaal"> Steen</label><br>

<strong>Werkwijze</strong><br>
<label class="option"><input type="checkbox" name="Werkwijze" value="14" data-group="Werkwijze"> Bekabeld</label>
<label class="option"><input type="checkbox" name="Werkwijze" value="15" data-group="Werkwijze"> Brandstof</label>
<label class="option"><input type="checkbox" name="Werkwijze" value="16" data-group="Werkwijze"> Accu</label><br>

<strong>Gewicht</strong><br>
<label class="option"><input type="checkbox" name="Gewicht" value="17" data-group="Gewicht"> 0-5kg</label>
<label class="option"><input type="checkbox" name="Gewicht" value="18" data-group="Gewicht"> 5-10kg</label>
<label class="option"><input type="checkbox" name="Gewicht" value="19" data-group="Gewicht"> 10+kg</label><br>

<strong>Staat</strong><br>
<label class="option"><input type="checkbox" name="Staat" value="21" data-group="Staat"> Nieuw</label>
<label class="option"><input type="checkbox" name="Staat" value="22" data-group="Staat"> Gebruikt</label>
<label class="option"><input type="checkbox" name="Staat" value="23" data-group="Staat"> Versleten</label><br><br>

<label>Beschrijving *</label><br>
<textarea name="Beschrijving" required></textarea><br><br>

<label>Beschikbaar van *</label><br>
<input type="date" name="Begindatum" required><br><br>

<label>Beschikbaar tot *</label><br>
<input type="date" name="Einddatum" required><br><br>

<label>Borg bedrag *</label><br>
<input type="number" step="0.01" name="BorgBedrag" required><br><br>

<label>Afbeelding *</label><br>
<img id="gereedschap-preview" src="" alt="Afbeelding preview"
  style="width:100px; height:100px; object-fit:cover; display:none;"><br>
<input type="file" id="afbeelding-input" accept="image/*"><br>
<button type="button" id="upload-btn">Upload afbeelding</button>
<input type="hidden" id="afbeelding-url" name="Afbeelding"><br><br>

<button type="submit">Opslaan</button>

</form>

<script src="js/gereedschapsregistratie.js"></script>

</body>
</html>
