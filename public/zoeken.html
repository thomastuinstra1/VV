<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoekresultaten - Gereedschapspunt</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/zoeken.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Ga naar hoofdinhoud</a>

    <header class="site-header">
      <div class="container nav-container">
        <div class="logo">
          <a href="index.html">
            <img
              src="./images/Logo.png"
              alt="Gereedschapspunt"
              class="logo-img"
            />
          </a>
        </div>

        <form class="header-search" id="headerSearchForm">
          <input
            type="text"
            id="headerSearchInput"
            placeholder="Zoek gereedschap of profielen..."
            aria-label="Zoek gereedschap of profielen"
          />
          <button type="submit">Zoeken</button>
        </form>

        <nav class="main-nav">
          <ul>
            <li data-auth="true">
              <a href="lenerdashboard.html">Lenerdashboard</a>
            </li>
            <li data-auth="true">
              <a href="uitlenerdashboard.html">Uitlenerdashboard</a>
            </li>
            <li data-auth="true"><a href="mijnchats.html">Berichten</a></li>
            <li data-auth="true">
              <a href="accountinstellingen.html">
                <div id="navAvatar">
                  <span id="navAvatarInitials">?</span>
                </div>
              </a>
            </li>
            <li data-guest="true"><a href="inlog.html">Inloggen</a></li>
            <li data-guest="true"><a href="register.html">Registreren</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="zoeken-header container">
        <h1>Zoekresultaten voor: <span id="zoektermLabel"></span></h1>

        <div class="zoeken-tabs" role="tablist">
          <button
            class="tab-btn active"
            id="tabGereedschap"
            role="tab"
            onclick="switchTab('gereedschap')"
          >
            Gereedschap <span class="tab-count" id="countGereedschap"></span>
          </button>
          <button
            class="tab-btn"
            id="tabProfielen"
            role="tab"
            onclick="switchTab('profielen')"
          >
            Profielen <span class="tab-count" id="countProfielen"></span>
          </button>
        </div>
      </section>

      <section class="container zoeken-resultaten">
        <!-- Gereedschap resultaten -->
        <div id="panelGereedschap" class="resultaten-panel">
          <div id="gereedschapGrid" class="tools-grid">
            <p class="laden-tekst">Gereedschap laden...</p>
          </div>
        </div>

        <!-- Profiel resultaten -->
        <div id="panelProfielen" class="resultaten-panel" hidden>
          <div id="profielenGrid" class="profielen-grid">
            <p class="laden-tekst">Profielen laden...</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-container">
        <div class="footer-brand">
          <h3>Gereedschapspunt</h3>
          <p>Leen slim, lokaal en duurzaam.</p>
        </div>
        <ul class="footer-links">
          <li><a href="#">Over ons</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Privacy</a></li>
        </ul>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Gereedschapspunt</p>
      </div>
    </footer>

    <div id="toast"></div>

    <script src="js/globaal.js"></script>
    <script src="js/logincheck.js"></script>
    <script src="js/zoeken.js"></script>
    <script src="https://gereedschapspunt.student.open-ict.hu/socket.io/socket.io.js"></script>
    <script src="js/floating-chat.js"></script>
  </body>
</html>
