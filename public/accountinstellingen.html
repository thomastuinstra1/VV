<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account instellingen</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/accountinstellingen.css" />
  </head>
  <body class="account-page-body">
   <header class="site-header">
  <div class="container nav-container">
    <div class="logo">
      <a href="index.html">
        <img src="./images/Logo.png" alt="Gereedschapspunt" class="logo-img" />
      </a>
    </div>

      <form class="header-search" action="zoeken.html" method="get">
        <input
          type="text"
          name="search"
          placeholder="Zoek gereedschap of profielen..."
          aria-label="Zoek gereedschap of profielen"
        />
          <button type="submit">Zoeken</button>
        </form>

    <nav class="main-nav">
      <ul>
        <li data-auth="true"><a href="lenerdashboard.html">Lenerdashboard</a></li>
        <li data-auth="true"><a href="uitlenerdashboard.html">Uitlenerdashboard</a></li>
        <li data-auth="true"><a href="mijnchats.html">Berichten</a></li>
        <li data-auth="true">
          <a href="accountinstellingen.html">
            <div id="navAvatar">
              <span id="navAvatarInitials">?</span>
            </div>
          </a>
        </li>
        <li data-guest="true"><a href="inlog.html">Inloggen</a></li>
        <li data-guest="true"><a href="register.html">Registreren</a></li>
      </ul>
    </nav>
  </div>
</header>

    <main class="account-page">
      <div class="container">
        <div class="account-shell">
          <div class="account-box">
            <img src="./images/gear.png" alt="" class="account-mascot" />
            <h1>Account instellingen</h1>
            <p class="account-sub">
              Beheer hier je profiel, contactgegevens en wachtwoord.
            </p>

            <form id="settings-form">
              <div class="profile-photo-section">
                <label>Profielfoto</label>

                <div class="profile-photo-row">
                  <img
                    id="profielfoto"
                    src=""
                    alt="Profielfoto"
                    class="profile-photo"
                  />

                  <div class="profile-photo-actions">
                    <input type="file" id="afbeelding-input" accept="image/*" />
                    <input
                      type="hidden"
                      id="afbeelding-url"
                      name="Afbeelding"
                    />
                  </div>
                </div>
              </div>

              <div class="form-grid">
                <div class="form-group">
                  <label for="Name">Gebruikersnaam</label>
                  <input type="text" id="Name" name="Name" />
                </div>

                <div class="form-group">
                  <label for="E_mail">Email</label>
                  <input type="email" id="E_mail" name="E_mail" />
                </div>

                <div class="form-group">
                  <label for="Postcode">Postcode</label>
                  <input type="text" id="Postcode" name="Postcode" />
                </div>

                <div class="form-group">
                  <label for="Password">Nieuw wachtwoord</label>
                  <div class="input-icon-wrapper">
                  <input type="password" id="Password" name="Password" />
                  <button type="button" id="togglePassword" class="toggle-password" aria-label="Wachtwoord tonen">
                    <img id="eyeIcon" src="./images/eye.svg" alt="" width="20" height="20"/>
                  </button>
                  </div>
                </div>

                <div class="form-group">
                  <label for="confirm-password">Bevestig wachtwoord</label>
                    <div class="input-icon-wrapper">
                    <input type="password" id="confirm-password" name="confirm-password" />
                    <button type="button" id="toggleConfirm" class="toggle-password" aria-label="Wachtwoord tonen">
                      <img id="eyeIconConfirm" src="./images/eye.svg" alt="" width="20" height="20"/>
                    </button>
                  </div>
                </div>

              <div class="account-actions">
                <button type="submit" class="primary-btn">Opslaan</button>
                <button
                  type="button"
                  id="logout-btn"
                  class="secondary-btn logout-btn"
                >
                  Uitloggen
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-container">
        <div class="footer-brand">
          <h3>Gereedschapspunt</h3>
          <p>Leen slim, lokaal en duurzaam.</p>
        </div>

        <ul class="footer-links">
          <li><a href="#">Over ons</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Privacy</a></li>
        </ul>
      </div>

      <div class="footer-bottom">
        <p>&copy; 2026 Gereedschapspunt</p>
      </div>
    </footer>
<div id="toast"></div>

    <script src="js/globaal.js"></script>
    <script src="js/accountinstellingen.js" defer></script>
    <script src="js/logincheck.js"></script>
    <script src="https://gereedschapspunt.student.open-ict.hu/socket.io/socket.io.js"></script>
    <script src="js/floating-chat.js"></script>
  </body>
</html>
