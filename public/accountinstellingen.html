<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Instellingen</title>
</head>
<body>
    <h1>Account Instellingen</h1>

    <form id="settings-form">
        <div>
    <label>Profielfoto</label>
            <img id="profielfoto" src="" alt="Profielfoto" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">
            <input type="file" id="afbeelding-input" accept="image/*">
            <button type="button" id="upload-btn">Upload foto</button>
        </div>
        <div>
            <label for="Name">Username</label>
            <input type="text" id="Name" name="Name">
        </div>
        <div>
            <label for="E_mail">Email</label>
            <input type="email" id="E_mail" name="E_mail">
        </div>
        <div>
            <label for="Postcode">Postcode</label>
            <input type="text" id="Postcode" name="Postcode">
        </div>
        <div>
            <label for="Password">Nieuw wachtwoord</label>
            <input type="password" id="Password" name="Password">
        </div>
        <div>
            <label for="confirm-password">Bevestig wachtwoord</label>
            <input type="password" id="confirm-password" name="confirm-password">
        </div>

        <div>
            <label for="BSN">BSN</label>
            <input type="text" id="BSN" name="BSN">
        </div>
        
        <button type="submit">Opslaan</button>
    </form>

    <script src="js/accountinstellingen.js" defer></script>
    
</body>
</html>
