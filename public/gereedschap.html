<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gereedschap Detail - Gereedschapspunt</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/gereedschap.css" />
  </head>

  <body>
    <div id="globalSpinner" class="spinner-overlay" style="display: none;">
      <div class="spinner"></div>
    </div>
    <div id="toast"></div>

    <a href="#main-content" class="skip-link">Ga naar hoofdinhoud</a>

    <header class="site-header">
  <div class="container nav-container">
    <div class="logo">
      <a href="index.html">
        <img src="./images/Logo.png" alt="Gereedschapspunt" class="logo-img" />
      </a>
    </div>

    <form class="header-search" action="lijst.html" method="get">
      <input
        type="text"
        name="zoek"
        placeholder="Zoek gereedschap..."
        aria-label="Zoek gereedschap"
      />
      <button type="submit">Zoeken</button>
    </form>

    <nav class="main-nav">
      <ul>
        <li data-auth="true"><a href="lenerdashboard.html">Lenerdashboard</a></li>
        <li data-auth="true"><a href="uitlenerdashboard.html">Uitlenerdashboard</a></li>
        <li data-auth="true"><a href="mijnchats.html">Berichten</a></li>
        <li data-auth="true"><a href="accountinstellingen.html">Account</a></li>
        <li data-guest="true"><a href="inlog.html">Inloggen</a></li>
         <li data-guest="true"><a href="register.html">Registreren</a></li>
      </ul>
    </nav>
  </div>
</header>

    <main id="main-content">
      <section class="tool-detail-section">
        <div class="container">
          <div class="detail-breadcrumb">
            <a href="lijst.html">Aanbod</a>
            <span>/</span>
            <span id="breadcrumbName">Gereedschap</span>
          </div>

          <div class="tool-detail-container">
            <div class="tool-images">
              <img
                id="toolImage"
                src="/images/default.jpg"
                alt="gereedschap afbeelding"
              />
            </div>

            <div class="tool-info">
              <span class="detail-tag">Beschikbaar in jouw buurt</span>
              <h1 id="toolName">Gereedschap Naam</h1>
              <p id="toolDescription">Beschrijving gereedschap</p>

              <div class="tool-meta-card">
                <div class="tool-price" id="toolBorg">Borg: €0</div>

                <div class="availability" id="toolAvailability">
                  Beschikbaar van <span id="startDate">--</span> tot
                  <span id="endDate">--</span>
                </div>
              </div>

              <div class="detail-actions">
                <a href="#" class="btn-reserve" id="reserveBtn">Reserveer nu</a>
                <a href="lijst.html" class="btn-back">Terug naar aanbod</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="js/globaal.js"></script>
    <script src="js/gereedschap.js"></script>
    <script src="js/logincheck.js"></script>
    <script src="https://gereedschapspunt.student.open-ict.hu/socket.io/socket.io.js"></script>
    <script src="js/floating-chat.js"></script>
  </body>
</html>
