<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mijn Chats - Gereedschapspunt</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/mijnchat.css" />
</head>

<body>

 <header class="site-header">
  <div class="container nav-container">
    <div class="logo">
      <a href="index.html">
        <img src="./images/Logo.png" alt="Gereedschapspunt" class="logo-img" />
      </a>
    </div>

    <form class="header-search" action="lijst.html" method="get">
      <input
        type="text"
        name="zoek"
        placeholder="Zoek gereedschap..."
        aria-label="Zoek gereedschap"
      />
      <button type="submit">Zoeken</button>
    </form>

    <nav class="main-nav">
      <ul>
        <li data-auth="true"><a href="lenerdashboard.html">Lenerdashboard</a></li>
        <li data-auth="true"><a href="uitlenerdashboard.html">Uitlenerdashboard</a></li>
        <li data-auth="true"><a href="mijnchats.html">Berichten</a></li>
        <li data-auth="true"><a href="accountinstellingen.html">Account</a></li>
        <li data-guest="true"><a href="inlog.html">Inloggen</a></li>
         <li data-guest="true"><a href="register.html">Registreren</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="chat-page">
  <div class="container">

    <div class="page-title">
      <h1>Mijn <span>chats</span></h1>
      <p class="subtitle">Gesprekken met leners en uitleners</p>
    </div>

    <div class="chat-list" id="chats-lijst">
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-text">Laden…</div>
      </div>
    </div>

  </div>
</main>

<div id="toast"></div>

<script src="js/globaal.js"></script>
<script src="js/logincheck.js"></script>
<script src="js/mijnchats.js"></script>
<script src="https://gereedschapspunt.student.open-ict.hu/socket.io/socket.io.js"></script>
<script src="js/floating-chat.js"></script>
</body>
</html>
