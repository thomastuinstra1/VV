<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="css/chat.css">
  <style>
    #chat-box { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    .my-message { text-align: right; color: blue; }
    .their-message { text-align: left; color: green; }
  </style>
</head>
<body>

  <h2>Chat</h2>

  <div id="chat-box"></div>

  <input type="text" id="chat-input" placeholder="Typ je bericht...">
  <button id="send-btn">Verstuur</button>

  <!-- Socket.IO client -->
  <script src="https://gereedschapspunt.student.open-ict.hu/socket.io/socket.io.js"></script>
  <!-- Chat script -->
  <script type="module" src="js/chat.js"></script>

</body>
</html>
