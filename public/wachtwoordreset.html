<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Nieuw wachtwoord</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/inlog.css">
</head>
<body>
  <div id="globalSpinner" class="spinner-overlay" style="display: none;">
    <div class="spinner"></div>
  </div>

  <main class="login-page">
    <div class="container">
      <div class="login-shell">
        <div class="login-box">
          <h1>Nieuw wachtwoord instellen</h1>
          <p class="login-sub">Kies een nieuw wachtwoord voor je account.</p>
          <div class="form-group">
            <label for="newPassword">Nieuw wachtwoord</label>
            <input type="password" id="newPassword" minlength="8" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Herhaal wachtwoord</label>
            <input type="password" id="confirmPassword" required>
          </div>
          <button id="resetBtn">Wachtwoord opslaan</button>
          <p id="resetMsg" style="margin-top:1rem;"></p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/globaal.js"></script>
  <script src="js/wachtwoordreset.js"></script>

</body>
</html>
